schema_version: 1

context:
  name: piqa
  version: "1.3.2"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 354aff428a1b69ceda26870e4a6d128c67ce75b6ff7ce4cf07d9a309b2ce681f

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - pytorch >=1.12.0
    - torchvision >=0.13.0

tests:
  - script:
      - pip check
      - python -c "import piqa"
      - python run_test.py
    files:
      recipe:
        - run_test.py
    requirements:
      run:
        - pip
        - python ${{ python_min }}.*
        - pytorch * cpu*
        - torchvision * cpu*

about:
  homepage: https://github.com/francois-rozet/piqa
  repository: https://github.com/francois-rozet/piqa
  summary: PyTorch Image Quality Assessment package
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
